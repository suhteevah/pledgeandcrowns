  <script type="text/babel" data-presets="env,react">
// PixelArt â€” render a 2D grid of palette-role characters to a crisp <canvas>.
// Grid is an array of equal-length strings; each char keys window.PALETTE.
// '.' or ' ' = transparent. Lighting + outline rules are the artist's job;
// this just renders pixels honestly.

function PixelArt({ grid, scale = 1, style, title }) {
  const ref = React.useRef(null);
  const w = grid[0].length;
  const h = grid.length;

  React.useEffect(() => {
    const cv = ref.current;
    if (!cv) return;
    cv.width = w;
    cv.height = h;
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, w, h);
    for (let y = 0; y < h; y++) {
      const row = grid[y];
      for (let x = 0; x < w; x++) {
        const ch = row[x];
        const col = window.PALETTE[ch];
        if (!col) continue;
        ctx.fillStyle = col.hex;
        ctx.fillRect(x, y, 1, 1);
      }
    }
  }, [grid, w, h]);

  return (
    <canvas
      ref={ref}
      title={title}
      style={{
        width: w * scale,
        height: h * scale,
        imageRendering: 'pixelated',
        display: 'block',
        ...style,
      }}
    />
  );
}

// PixelLayered â€” multi-layer compositor. Each layer is { grid, dx, dy }.
// Useful for backgrounds + foreground sprites in the world map / cinematic.
function PixelLayered({ width, height, layers, scale = 1, background, style }) {
  const ref = React.useRef(null);

  React.useEffect(() => {
    const cv = ref.current;
    if (!cv) return;
    cv.width = width;
    cv.height = height;
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, width, height);
    if (background) {
      ctx.fillStyle = background;
      ctx.fillRect(0, 0, width, height);
    }
    for (const layer of layers) {
      const { grid, dx = 0, dy = 0 } = layer;
      const lh = grid.length;
      for (let y = 0; y < lh; y++) {
        const row = grid[y];
        for (let x = 0; x < row.length; x++) {
          const ch = row[x];
          const col = window.PALETTE[ch];
          if (!col) continue;
          ctx.fillStyle = col.hex;
          ctx.fillRect(x + dx, y + dy, 1, 1);
        }
      }
    }
  }, [width, height, layers, background]);

  return (
    <canvas
      ref={ref}
      style={{
        width: width * scale,
        height: height * scale,
        imageRendering: 'pixelated',
        display: 'block',
        ...style,
      }}
    />
  );
}

Object.assign(window, { PixelArt, PixelLayered });

  // remaining 16 cells: repeat for visual variety; bible asks for those 16 but

];

function composeSheet(tiles, cols = 4) {
  // 4 cols Ã— 4 rows = 16 tiles, each 16Ã—16 = 64Ã—64. To make 128Ã—128 we
  // double-pixel = 8Ã—8 grid of 16Ã—16. Actually bible says 8Ã—8 grid of 16Ã—16
  // cells with grid lines = 128Ã—128 with thin lines... but 8*16=128 exact.
  // We'll use 4Ã—4 layout (4*16=64) but spec wants 8Ã—8 â€” so stretch by repeating
  // each tile into a 2Ã—2 cluster (so visual spec still reads clearly).
  const out = [];
  const rows = Math.ceil(tiles.length / cols);
  for (let ty = 0; ty < rows; ty++) {
    for (let py = 0; py < 16; py++) {
      let line = '';
      for (let tx = 0; tx < cols; tx++) {
        const tile = tiles[ty * cols + tx];
        if (!tile) line += '.'.repeat(16);
        else line += tile[py];
      }
      out.push(line);
    }
  }
  return out;
}

// REF-06 â€” Code Editor frame, 640Ã—360. No code yet.
// Top bar w/ CAST/TEST/COMMIT pixel-glyph buttons. Main area split 60/40.
// Left: parchment book with leather binding. Right: GOAL (top, aged paper)
// + COMPILER OUTPUT (bottom, cobalt deep slate). Outer Stone grey double-line
// border with Oxblood corner rivets.

// We'll generate this procedurally â€” 640Ã—360 is too large to hand-pixel.
function REF06({ scale = 1 }) {
  const ref = React.useRef(null);
  const W = 640, H = 360;

  React.useEffect(() => {
    const cv = ref.current;
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const C = window.PALETTE;
    const px = (x, y, w, h, key) => {
      const c = C[key]; if (!c) return;
      ctx.fillStyle = c.hex; ctx.fillRect(x|0, y|0, w|0, h|0);
    };
    const rect = (x, y, w, h, key) => px(x, y, w, h, key);
    const stroke = (x, y, w, h, key) => {
      px(x, y, w, 1, key); px(x, y+h-1, w, 1, key);
      px(x, y, 1, h, key); px(x+w-1, y, 1, h, key);
    };

    // â”€â”€ BG: dim parchment underlay (so the chamber doesn't show through cracks)
    rect(0, 0, W, H, 'V');

    // â”€â”€ Outer frame: Stone grey double line w/ Oxblood corner rivets
    rect(0, 0, W, H, 'S');
    stroke(0, 0, W, H, 'X');                        // black outer edge
    rect(2, 2, W-4, H-4, 'S');                      // grey band
    stroke(4, 4, W-8, H-8, 'X');                    // inner edge
    rect(6, 6, W-12, H-12, 'B');                    // basalt inset
    stroke(7, 7, W-14, H-14, 'X');
    // Oxblood corner rivets (4 corners, 5Ã—5)
    [[6,6],[W-12,6],[6,H-12],[W-12,H-12]].forEach(([rx,ry])=>{
      rect(rx, ry, 6, 6, 'O');
      stroke(rx, ry, 6, 6, 'X');
      rect(rx+2, ry+2, 2, 2, 'L');
    });

    // â”€â”€ Top bar (24px tall, just inside outer frame)

    const drawBtn = (bx, by, bw, label, accent) => {

      stroke(bx, by, bw, 18, 'X');
      rect(bx+1, by+1, bw-2, 1, 'C');                // top hi

      rect(bx+3, by+5, 8, 8, accent);

      // pixel-glyph "letters" â€” just blocks suggesting text
      let lx = bx + 14;
      for (let i = 0; i < label.length; i++) {

        rect(lx, by+8, 4, 1, 'V');

    drawBtn(20,  topY+5, 70,  'CAST',   'O');         // oxblood
    drawBtn(96,  topY+5, 70,  'TEST',   'T');         // teal
    drawBtn(172, topY+5, 92,  'COMMIT', 'G');         // gold

    // Window-style chrome dot on right
    [W-30, W-44, W-58].forEach((cx, i) => {

      stroke(cx, topY+9, 8, 8, 'X');
    });

    // â”€â”€ Main area split 60/40 below top bar
    const mainY = topY + topH + 4;
    const mainH = H - mainY - 14;
    const splitX = 14 + Math.floor((W-28) * 0.6);

    // LEFT panel â€” parchment book
    const leftX = 14, leftW = splitX - leftX - 2;
    rect(leftX, mainY, leftW, mainH, 'B');
    stroke(leftX, mainY, leftW, mainH, 'X');
    // iron rivets at corners of panel
    [[leftX+2,mainY+2],[leftX+leftW-8,mainY+2],[leftX+2,mainY+mainH-8],[leftX+leftW-8,mainY+mainH-8]].forEach(([rx,ry])=>{

    });
    // leather binding strip on left edge
    rect(leftX+10, mainY+10, 14, mainH-20, 'O');
    stroke(leftX+10, mainY+10, 14, mainH-20, 'X');
    // 3 leather bands across binding
    [0.25, 0.5, 0.75].forEach(t => {
      const by = mainY + 10 + Math.floor((mainH-20)*t);
      rect(leftX+8, by-2, 18, 5, 'Y');
      stroke(leftX+8, by-2, 18, 5, 'X');

    });
    // Parchment page
    const pgX = leftX+26, pgY = mainY+10, pgW = leftW-36, pgH = mainH-20;
    rect(pgX, pgY, pgW, pgH, 'C');
    stroke(pgX, pgY, pgW, pgH, 'B');
    // Subtle parchment texture: scattered V dots
    for (let i = 0; i < 80; i++) {
      const dx = pgX + 4 + ((i*37) % (pgW-8));
      const dy = pgY + 4 + ((i*53) % (pgH-8));
      px(dx, dy, 1, 1, 'V');
    }
    // Faint horizontal "ruling lines" (very pale)
    for (let ly = pgY + 16; ly < pgY + pgH - 8; ly += 12) {
      for (let lx = pgX + 8; lx < pgX + pgW - 8; lx += 2) {
        px(lx, ly, 1, 1, 'V');
      }
    }
    // Line-number gutter (tiny gold dots, no numerals â€” empty UI)
    for (let ly = pgY + 16; ly < pgY + pgH - 8; ly += 12) {
      px(pgX + 6, ly-1, 2, 2, 'N');
    }

    // RIGHT panel â€” split into GOAL (top) + COMPILER OUTPUT (bottom)
    const rightX = splitX + 2, rightW = W - 14 - rightX;
    const goalH = Math.floor(mainH * 0.42);
    // GOAL frame
    rect(rightX, mainY, rightW, goalH, 'B');
    stroke(rightX, mainY, rightW, goalH, 'X');
    [[rightX+2,mainY+2],[rightX+rightW-8,mainY+2],[rightX+2,mainY+goalH-8],[rightX+rightW-8,mainY+goalH-8]].forEach(([rx,ry])=>{
      rect(rx, ry, 6, 6, 'O'); stroke(rx, ry, 6, 6, 'X');
    });
    rect(rightX+10, mainY+10, rightW-20, goalH-20, 'V');
    stroke(rightX+10, mainY+10, rightW-20, goalH-20, 'B');
    // GOAL header strip â€” tiny pixel-glyph "GOAL"
    rect(rightX+10, mainY+10, rightW-20, 12, 'O');
    let lx = rightX + 16;
    for (let i = 0; i < 4; i++) { rect(lx, mainY+13, 4, 6, 'C'); lx += 6; }

    // COMPILER OUTPUT frame (cobalt deep slate)
    const coY = mainY + goalH + 4;
    const coH = mainH - goalH - 4;
    rect(rightX, coY, rightW, coH, 'B');
    stroke(rightX, coY, rightW, coH, 'X');
    [[rightX+2,coY+2],[rightX+rightW-8,coY+2],[rightX+2,coY+coH-8],[rightX+rightW-8,coY+coH-8]].forEach(([rx,ry])=>{
      rect(rx, ry, 6, 6, 'O'); stroke(rx, ry, 6, 6, 'X');
    });
    rect(rightX+10, coY+10, rightW-20, coH-20, '<');
    stroke(rightX+10, coY+10, rightW-20, coH-20, 'B');
    // header strip â€” "COMPILER OUTPUT" placeholder
    rect(rightX+10, coY+10, rightW-20, 12, 'A');
    lx = rightX + 16;
    for (let i = 0; i < 7; i++) { rect(lx, coY+13, 4, 6, 'I'); lx += 6; }
    // Cursor-blink hint dot
    rect(rightX+18, coY+30, 4, 7, 'I');
  }, []);

  return (
    <canvas ref={ref}
      style={{ width: W*scale, height: H*scale, imageRendering: 'pixelated', display: 'block' }} />
  );
}
window.REF06 = REF06;
window.REF06_ROLES = ['X','S','B','V','C','O','L','Y','N','G','T','I','A','<'];

</script>

<script type="text/babel" data-presets="env,react">
// REF-09 v2 â€” World map cinematic, 320Ã—180, redone as a single cohesive
// painted scene with proper depth bands, atmospheric perspective, connecting
// roads, and a real coastline curve. Pin markers stay; zones flow as one map.

function REF09v2({ scale = 2 }) {
  const ref = React.useRef(null);
  const W = 320, H = 180;

  React.useEffect(() => {
    const cv = ref.current;
    cv.width = W; cv.height = H;
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    const C = window.PALETTE;
    const px = (x, y, w, h, key) => {
      const c = C[key]; if (!c) return;
      ctx.fillStyle = c.hex; ctx.fillRect(x|0, y|0, w|0, h|0);
    };

    // â”€â”€ Sky band (top): Cobalt deep â†’ Cobalt â†’ Mist teal at horizon
    for (let y = 0; y < 56; y++) {
      const t = y / 56;
      const k = t < 0.35 ? '<' : (t < 0.7 ? '>' : 'M');

    }
    // Stars + moon
    [[18,8],[34,15],[60,6],[92,12],[140,7],[182,14],[218,9],[252,17],[286,5],[300,11]].forEach(([x,y]) => px(x,y,1,1,'#'));
    px(264, 14, 7, 7, 'C'); px(264, 14, 1, 1, 'V'); px(270, 20, 1, 1, 'V');

    // â”€â”€ Cloud strata (mid-sky, behind floating Temple)
    for (let i = 0; i < 40; i++) {
      const cx = (i * 17) % W;
      const cy = 30 + (i * 7) % 22;

      px(cx+1, cy-1, 6, 1, 'C');

    // Lower cloud band (the floating Temple platform)
    for (let i = 0; i < 35; i++) {

    // â”€â”€ TEMPLE â€” floating cathedral (top center), bigger and integrated
    const tcX = 132, tcY = 22;

    for (let i = 0; i < 60; i++) {
      const cx = tcX - 30 + i;
      const cy = 50 + Math.round(Math.sin(i * 0.4) * 1);
      px(cx, cy, 1, 4, 'C');
    }
    // cathedral body
    px(tcX-2, tcY+8, 28, 24, 'O');
    px(tcX-2, tcY+8, 28, 1, 'X');
    px(tcX-2, tcY+31, 28, 1, 'X');
    px(tcX-2, tcY+8, 1, 24, 'X');
    px(tcX+25, tcY+8, 1, 24, 'X');

    px(tcX+10, tcY-6, 4, 14, 'O');
    px(tcX+10, tcY-6, 4, 1, 'X');
    px(tcX+11, tcY-9, 2, 4, 'G');
    px(tcX+11, tcY-11, 2, 2, '#');
    // side spires
    px(tcX+1, tcY+2, 3, 8, 'O');
    px(tcX+20, tcY+2, 3, 8, 'O');
    px(tcX+1, tcY+2, 3, 1, 'X');
    px(tcX+20, tcY+2, 3, 1, 'X');
    // stained-glass rose window â€” split-comp triad
    const rwX = tcX+8, rwY = tcY+13;
    px(rwX+2, rwY, 4, 1, 'X');
    px(rwX, rwY+2, 1, 4, 'X');
    px(rwX+8, rwY+2, 1, 4, 'X');
    px(rwX+2, rwY+8, 4, 1, 'X');
    px(rwX+1, rwY+1, 1, 1, 'X'); px(rwX+7, rwY+1, 1, 1, 'X');
    px(rwX+1, rwY+7, 1, 1, 'X'); px(rwX+7, rwY+7, 1, 1, 'X');
    // pane fills
    px(rwX+3, rwY+1, 3, 1, 'O');
    px(rwX+1, rwY+3, 3, 3, 'T');
    px(rwX+5, rwY+3, 3, 3, 'E');
    px(rwX+3, rwY+6, 3, 1, 'G');
    px(rwX+4, rwY+4, 1, 1, '%');
    // lower windows along nave
    [4, 10, 16].forEach(dx => {
      px(tcX+dx, tcY+18, 2, 6, 'T');
      px(tcX+dx, tcY+18, 2, 1, 'X');
    });
    px(tcX+22, tcY+18, 2, 6, 'O');

    // â”€â”€ HORIZON LINE â€” faint mist
    for (let y = 56; y < 64; y++) {
      px(0, y, W, 1, y < 60 ? 'M' : 'V');
    }

    // â”€â”€ DISTANT MOUNTAINS (background depth band) â€” Throne in the middle
    for (let i = 0; i < 12; i++) {
      const baseX = i * 28 - 10;

      const w = (28 - dy) * 2 + 4;
      px(throneX - w/2, 70 - dy, w, 1, dy < 5 ? '#' : (dy < 12 ? 'V' : 'S'));

    // citadel
    px(throneX-7, 56, 14, 12, 'V');
    px(throneX-7, 56, 14, 1, 'X');
    px(throneX-7, 67, 14, 1, 'X');
    px(throneX-7, 56, 1, 12, 'X');
    px(throneX+6, 56, 1, 12, 'X');
    px(throneX-3, 60, 6, 4, '<');
    px(throneX-4, 50, 8, 6, 'V');

    px(throneX-1, 46, 2, 5, 'G');

    px(libX, 58, 22, 1, 'X');
    px(libX+2, 52, 4, 7, 'A'); px(libX+2, 52, 4, 1, 'X');

    px(libX+5, 60, 1, 1, '!');

    // â”€â”€ MIDGROUND LAND BAND
    // Continent base â€” forest greens, with a gradient that brings warmth at the south
    for (let y = 64; y < H; y++) {
      const t = (y - 64) / (H - 64);
      let key = 'F';
      if (t > 0.4) key = 'E';
      if (t > 0.75) key = 'H';

    // Texture: pine shadow + spring meadow specks
    for (let i = 0; i < 320; i++) {

    // Subtle scattered trees (pine triangles)
    for (let i = 0; i < 35; i++) {
      const x = 70 + (i * 13) % 210;
      const y = 70 + (i * 7) % 60;
      // skip if on coast or gorge
      if (x < 78 || (x > 130 && x < 168 && y > 86 && y < 130)) continue;

      px(x-1, y+1, 3, 1, 'F');
      px(x-1, y+2, 3, 1, 'J');
    }

    // â”€â”€ COASTLINE (west) â€” proper curve, sea + sand
    // Sea
    for (let y = 64; y < H; y++) {
      const t = (y - 64) / (H - 64);
      // coast curves: x_coast = function of y
      const xc = 38 + Math.round(Math.sin((y-64) * 0.08) * 8) + Math.round((y-64) * 0.05);

      px(xc, y, 3, 1, 'L');
    }
    // wave glints
    for (let i = 0; i < 40; i++) {
      const x = 4 + (i * 7) % 40;
      const y = 72 + (i * 11) % 100;
      px(x, y, 2, 1, 'M');
    }
    // Briney Cove ships â€” small distant sails
    [[14, 110], [22, 130]].forEach(([sx, sy]) => {
      px(sx, sy, 6, 2, 'V');
      px(sx, sy, 6, 1, 'X');
      px(sx+2, sy-6, 1, 6, 'B');
      px(sx, sy-5, 5, 4, 'C');
      px(sx, sy-5, 5, 1, 'X');
    });

    // â”€â”€ BORROW BRIDGE GORGE â€” cuts across midway, cleanly
    const gorgeY0 = 86, gorgeY1 = 132;
    for (let y = gorgeY0; y < gorgeY1; y++) {
      const cx = 148 + Math.round(Math.sin((y-gorgeY0) * 0.18) * 3);
      const w = 8 - Math.abs(y - (gorgeY0+gorgeY1)/2) * 0.05;
      px(cx - w/2, y, w, 1, 'A');
      px(cx - w/2, y, 1, 1, 'X');
      px(cx + w/2 - 1, y, 1, 1, 'X');
    }
    // Bridge â€” clear stone span across gorge
    const brY = 108;
    px(140, brY, 22, 5, 'V');
    px(140, brY, 22, 1, 'X');
    px(140, brY+4, 22, 1, 'X');
    px(143, brY+1, 16, 2, 'S');
    // arches under bridge
    [144, 150, 156].forEach(ax => {
      px(ax, brY+5, 4, 3, 'A');
      px(ax, brY+5, 4, 1, 'X');
    });

    // â”€â”€ ROADS â€” connecting major zones, 1px tan paths
    const drawRoad = (pts) => {
      for (let i = 1; i < pts.length; i++) {
        const [x0,y0] = pts[i-1], [x1,y1] = pts[i];
        const dx = x1-x0, dy = y1-y0;

          const x = x0 + Math.round(dx * s/steps);

          px(x, y, 1, 1, 'N');
          px(x, y+1, 1, 1, 'Z');
        }
      }
    };
    // Hearthstone â†’ Bridge â†’ Guildhall â†’ Throne
    drawRoad([[100, 158], [120, 140], [140, 120], [148, 110], [160, 102], [180, 94], [186, 80], [180, 70]]);
    // Hearthstone â†’ Tavern â†’ Forge
    drawRoad([[100, 158], [82, 148], [76, 134], [82, 120]]);
    // Guildhall â†’ Library
    drawRoad([[200, 96], [240, 88], [275, 78]]);
    // Mage Tower offshoot
    drawRoad([[200, 96], [232, 84], [248, 76]]);

    // â”€â”€ HEARTHSTONE VILLAGE (south) â€” cluster of cottages on meadow
    const hsX = 96, hsY = 156;
    // meadow patch
    for (let i = 0; i < 30; i++) {
      const x = hsX - 14 + (i * 5) % 28;
      const y = hsY - 6 + (i * 3) % 14;
      px(x, y, 1, 1, 'H');
    }
    // 4 cottages
    [[-10, 0], [4, 4], [-4, -8], [10, -2]].forEach(([dx, dy]) => {
      const cx = hsX + dx, cy = hsY + dy;
      px(cx, cy, 6, 4, 'V');
      px(cx, cy+3, 6, 1, 'X');
      px(cx-1, cy-2, 8, 3, 'O');
      px(cx-1, cy-2, 1, 1, 'X');
      px(cx+7, cy-2, 1, 1, 'X');
      px(cx+2, cy+1, 2, 2, 'Y');
      px(cx+5, cy+1, 1, 1, 'L');  // window light
    });

    // â”€â”€ GUILDHALL CITY (mid-east of bridge)
    const ghX = 192;
    for (let i = 0; i < 9; i++) {
      const cx = ghX + (i % 3) * 7;
      const cy = 88 + Math.floor(i/3) * 8;
      px(cx, cy, 6, 6, 'V');
      px(cx, cy+5, 6, 1, 'X');
      px(cx-1, cy-2, 8, 3, 'O');
      px(cx-1, cy-2, 1, 1, 'X');
      px(cx+7, cy-2, 1, 1, 'X');
      px(cx+2, cy+2, 2, 3, 'Y');

    // big guildhall keep
    px(ghX+12, 86, 12, 14, 'V');
    px(ghX+12, 86, 12, 1, 'X');

  <div id="status">loading...</div>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react">
    const REFS = ['REF01','REF02','REF03','REF04','REF05','REF06','REF07','REF08','REF09','REF10'];
    window.__refs = {};
    window.__refs_done = false;
    function App() {
      return React.createElement('div', null,
        REFS.map(id => {
          const Comp = window[id];
          if (!Comp) return React.createElement('div', { key: id }, 'MISSING: ' + id);
          return React.createElement('div', { key: id, className: 'ref', 'data-ref': id },
            React.createElement('h3', null, id),
            React.createElement(Comp, { scale: 1 })
          );
        })
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    function snapshot() {
      let captured = 0;
      for (const id of REFS) {
        const wrap = document.querySelector('[data-ref="' + id + '"]');
        if (!wrap) { window.__refs[id] = { error: 'no wrapper' }; continue; }
        const canvas = wrap.querySelector('canvas');
        if (!canvas) { window.__refs[id] = { error: 'no canvas' }; continue; }
        try {
          window.__refs[id] = { w: canvas.width, h: canvas.height, dataUrl: canvas.toDataURL('image/png') };
          captured++;
        } catch (e) { window.__refs[id] = { error: String(e) }; }
      }
      window.__refs_done = true;
      const s = document.getElementById('status');
      s.textContent = 'done: ' + captured + '/' + REFS.length;
      s.style.background = captured === REFS.length ? '#0f0' : '#f00';
    }
    const t0 = Date.now();
    function poll() {
      const allDefined = REFS.every(id => typeof window[id] === 'function');
      const allCanvases = REFS.every(id => {
        const wrap = document.querySelector('[data-ref="' + id + '"]');
        return wrap && wrap.querySelector('canvas');
      });
      const elapsed = Date.now() - t0;
      const definedCount = REFS.filter(id => typeof window[id] === 'function').length;
      document.getElementById('status').textContent = 'defined=' + definedCount + '/' + REFS.length + ' elapsed=' + (elapsed/1000).toFixed(1) + 's';
      if ((allDefined && allCanvases) || elapsed > 30000) {
        requestAnimationFrame(() => requestAnimationFrame(snapshot));
      } else {
        setTimeout(poll, 250);
      }
    }
    poll();
  </script>
</body>
