<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pledge & Crown — Reference Set (REF-01..REF-10)</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f0eee9; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Palette + renderer -->
  <script src="palette.js"></script>
  <script type="text/babel" src="pixel-art.jsx"></script>

  <!-- Design canvas -->
  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- Artboard frame -->
  <script type="text/babel" src="refs/artboard-frame.jsx"></script>
  <script type="text/babel" src="refs/palette-legend.jsx"></script>

  <!-- The 9 reference images -->
  <script type="text/babel" src="refs/ref-01-player.jsx"></script>
  <script type="text/babel" src="refs/ref-02-ferris.jsx"></script>
  <script type="text/babel" src="refs/ref-03-borrow-checker.jsx"></script>
  <script type="text/babel" src="refs/ref-04-tiles-village.jsx"></script>
  <script type="text/babel" src="refs/ref-05-tiles-tower.jsx"></script>
  <script type="text/babel" src="refs/ref-06-editor.jsx"></script>
  <script type="text/babel" src="refs/ref-07-goblin.jsx"></script>
  <script type="text/babel" src="refs/ref-08-potion.jsx"></script>
  <script type="text/babel" src="refs/ref-09-worldmap.jsx"></script>
  <script type="text/babel" src="refs/ref-09-worldmap-v2.jsx"></script>
  <script type="text/babel" src="refs/ref-10-title.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const SUFFIX_PREFIX = `Pixel art, 16-bit / SNES-era aesthetic, hand-crafted feel.
Strict pixel grid, no anti-aliasing within sprites, integer-multiple
scalable. 1-pixel outline using Coalblack #161313 (never #000).
Lighting from top-left at 45°, hard-edged shading bands ≤3 per surface.
Heraldic Code palette v2.0 (32 colors): see legend.
No off-palette colors. No text. No melted features.`;

    const REF_META = [
      {
        id: 'REF-01', title: 'Player character (default)',
        resolution: '32×32', native: [32,32], scale: 12,
        zone: 'Hearthstone Village (Act 1) start',
        Component: window.REF01, roles: window.REF01_ROLES, status: 'pending',
        notes: [
          'Cobalt deep tunic — keys off the cool counterweight, not anchor color, so the player reads neutral against any zone.',
          'Old gold staff crystal threads The Crown into the silhouette from frame zero.',
          'Pale skin (Pink quartz / Dusty rose / Wineflesh) — single-ramp; designed for clean palette-swap to Olive or Dark per art-handoff §"Skin tones".',
          '1px Coalblack outline. No #000 anywhere.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 32×32 pixels, transparent background.
  SUBJECT = Front-facing human adventurer, idle pose.
  Wearing a simple traveler's tunic in Cobalt deep (#0E2E54), a tan
  leather belt, brown boots, and a small satchel at the hip. Short
  hair, friendly face, neutral expression. Holding a wooden staff
  with a small Old gold (#D2A53F) crystal at the tip.
  Light skin tone, but designed for easy palette-swap to other skin
  tones in post-production. Single still frame; this is the idle
  base pose.]`,
      },
      {
        id: 'REF-02', title: 'Ferris guide',
        resolution: '32×32', native: [32,32], scale: 12,
        zone: "Companion · accompanies player from Act 1",
        Component: window.REF02, roles: window.REF02_ROLES, status: 'pending',
        notes: [
          "Re-palette'd from orange to Wineflesh — DELIBERATE divergence from the official Rust mascot. Trademark-safe.",
          'Old gold ridges on the shell tie him to The Crown thematically; he\'s the player\'s heraldic familiar.',
          'Round Parchment-cream eyes on Basalt outline give him face-readability at 1× even in a busy frame.',
          'Designed slightly cartoonier than canon Ferris — softer claw arc, taller eye stalks.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 32×32 pixels, transparent background.
  SUBJECT = A small, friendly crab character. Round body, two large
  expressive eyes on stalks, two front claws raised in a welcoming
  gesture. Body color is heraldic burgundy — Wineflesh (#982D52) midtone
  with Old gold (#D2A53F) highlights on claw-tips and shell ridges,
  Crypt (#3E1220) shadows underneath, slightly lighter Dusty rose
  (#C56883) belly. Whimsical, approachable, NOT the official Rust
  Foundation Ferris — distinct silhouette (burgundy-and-gold, not
  orange), slightly more cartoonish proportions. Standing on tiny feet,
  looking up and to the right as if narrating. Single still frame.]`,
      },
      {
        id: 'REF-03', title: 'The Borrow Checker NPC',
        resolution: '64×64', native: [64,64], scale: 6,
        zone: 'Borrow Bridge (Act 2)',
        Component: window.REF03, roles: window.REF03_ROLES, status: 'pending',
        notes: [
          'Cobalt deep robe — gives him the same cool-family register as the player, but darker and longer; reads as authority, not antagonist.',
          'Main teal embroidered & and &mut runes along hem and sleeves. Bright teal eye glow under hood = the only saturated point in the silhouette.',
          'Stone bridge plinth at the base ties him to his domain (Borrow Bridge Act 2) without needing a background.',
          'Iron staff with balance scale (Old gold pans on Antique brass arms) — the lifetime/scale metaphor is literal.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 64×64 pixels, transparent background.
  SUBJECT = A tall, austere robed figure standing on a stone bridge.
  Robe is Cobalt deep (#0E2E54) with embroidered glowing Main teal
  (#2A8482) reference symbols (& and &mut runes) along the hem and
  sleeves. Hood pulled low, face mostly in shadow but two faint
  Bright teal (#5BB8AF) eyes visible. Holding a tall iron staff
  topped with a balance scale. Posture upright, formal, slightly
  intimidating but not evil — he is doing his job.]`,
      },
      {
        id: 'REF-04', title: 'Hearthstone Village tile sample sheet',
        resolution: '64×64 sheet (4×4 of 16×16)', native: [64,64], scale: 6,
        zone: 'Hearthstone Village (Act 1)',
        Component: window.REF04, roles: window.REF04_ROLES, status: 'pending',
        notes: [
          '16 tiles in spec order: grass · tall grass · path · path corner · cobble · fence · fence corner · well-top · well-bottom · yellow flowers · red flowers · bush · sapling · hay bale · cart · signpost.',
          'Strict zone palette: Forest / Pine / Spring meadow grass + Bog umber / Bronze paths + Parchment cream accents.',
          'NOTE: bible originally calls for 8×8 of 16×16 = 128×128. We packed 4×4 here so per-tile detail stays legible at sign-off scale; sheet can re-sliced to 8×8 by the asset pipeline.',
          'Each tile must seamlessly tile against neighbors of same type (grass↔grass, path↔path).',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 128×128 pixels (8×8 grid of 16×16 tiles, white grid lines
  between tiles for clarity).
  SUBJECT = Tile reference sheet, in this exact order across the grid:
  (1) plain grass, (2) tall grass with flowers, (3) dirt path straight,
  (4) dirt path corner, (5) cobblestone, (6) wooden fence horizontal,
  (7) wooden fence corner, (8) stone well top-half, (9) stone well bottom-
  half, (10) wildflower patch (yellow), (11) wildflower patch (red),
  (12) bush, (13) sapling tree, (14) hay bale, (15) wooden cart,
  (16) signpost (no text). Hearthstone Village palette only.]`,
      },
      {
        id: 'REF-05', title: "Trait Mage's Tower interior tile sheet",
        resolution: '64×64 sheet (4×4 of 16×16)', native: [64,64], scale: 6,
        zone: "Trait Mage's Tower (Act 4)",
        Component: window.REF05, roles: window.REF05_ROLES, status: 'pending',
        notes: [
          '16 tiles: marble plain · marble+rune · magic circle · stairs up · stairs down · brick wall · sconce lit · bookshelf · doorway · crystal pedestal · spell book · brazier · carpet edge · starlight window · wizard table · crystal ball.',
          'Palette is dominantly Royal arcane + Old gold + Mage glow, with Coalblack outlines.',
          'Bible budget: violet ≤5% of any non-magic frame. This sheet is the EXCEPTION — Act 4 is the magic zone, so violet is allowed to dominate.',
          'Specular white reserved for crystal-ball glint and starlight twinkles only.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 128×128 pixels (8×8 grid of 16×16 tiles, white grid lines).
  SUBJECT = Mystical tower interior tile reference sheet. Order:
  (1) Royal arcane marble floor plain, (2) Royal arcane marble with Old
  gold inlay rune, (3) Mage glow magic circle, (4) staircase up,
  (5) staircase down, (6) Royal arcane brick wall, (7) wall with Old
  gold sconce (lit), (8) wall with bookshelf, (9) arched doorway,
  (10) crystal pedestal, (11) levitating spell book, (12) brazier with
  Mage glow flame, (13) ornate carpet edge, (14) tall window with
  starlight, (15) wizard table with potions, (16) crystal ball stand.
  Royal arcane (#3A1559) + Old gold (#D2A53F) + Mage glow (#9D6FE0).]`,
      },
      {
        id: 'REF-06', title: 'Code Editor frame',
        resolution: '640×360', native: [640,360], scale: 1,
        zone: 'Used everywhere — diegetic UI for the Compiler bossfights',
        Component: window.REF06, roles: window.REF06_ROLES, status: 'pending',
        notes: [
          'Layout: 24px top bar (CAST · TEST · COMMIT pixel-glyph buttons) → 60/40 split. Left = parchment book. Right = GOAL (top, Aged paper) over COMPILER OUTPUT (bottom, Cobalt-deep slate).',
          'Iron-bound edges with Oxblood corner rivets at every panel — the rivets ARE the brand element of the editor.',
          'Three Stardew-style window dots top-right (Oxblood / Old gold / Main teal) double as run/test/commit affordances later if needed.',
          'No code, no labels yet. This is the empty UI shell — copy is rendered through the engine\'s text renderer per bible rule.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 640×360 pixels.
  SUBJECT = Pixel-art UI frame for the in-game code editor. Top bar 24px
  with three pixel-art buttons (CAST/TEST/COMMIT). Main area 60/40 split.
  Left: Parchment cream (#FCEFC8) book with leather binding. Right
  stacked: GOAL on Aged paper (#BFB2A0); COMPILER OUTPUT on Cobalt deep
  (#0E2E54). Outer hand-drawn pixel double-line border in Stone grey
  (#7A7064) with Oxblood (#6B1F35) corner rivets. No text, no code.]`,
      },
      {
        id: 'REF-07', title: 'Generic goblin enemy',
        resolution: '32×32', native: [32,32], scale: 12,
        zone: 'Hearthstone outskirts → Tavern (mid-range threat)',
        Component: window.REF07, roles: window.REF07_ROLES, status: 'pending',
        notes: [
          'Forest skin (Forest mid + Pine shadow + Spring meadow highlight) — opportunistic green, NOT Pine-shadow-only "evil green."',
          'Bronze leather scraps (Bronze + Antique brass) instead of full armor → reads scrappy, low-tier.',
          'Stone-grey + Basalt rusty short sword. Pose looks right; player faces left → reads enemy.',
          'Mischievous expression: small Pink quartz eye glint, single Alarm scarlet nose dot, yellow tooth gap.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 32×32 pixels, transparent background.
  SUBJECT = Small green-skinned goblin, idle pose, looking right.
  Hunched posture, pointed ears, mischievous (not evil — opportunistic).
  Scraps of brown leather armor over a tattered tunic. Holding a rusty
  short sword in the right hand. Skin uses Forest (#487E40) with Pine
  (#27502E) shadows.]`,
      },
      {
        id: 'REF-08', title: 'Healing Potion icon',
        resolution: '16×16', native: [16,16], scale: 24,
        zone: 'UI · inventory grid · all zones',
        Component: window.REF08, roles: window.REF08_ROLES, status: 'pending',
        notes: [
          'Reads as a potion at 16×16 inside a busy inventory grid — bottle silhouette is unmistakable even when scaled to 1×.',
          'Alarm scarlet liquid is the ONLY consumer of Alarm scarlet outside actual error UI; bible permits because health potions are diegetic alarms.',
          'Bronze cork + Specular white upper-left highlight = instant "glass" read.',
          'Parchment cream label band — empty (no text per bible rule on signage).',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 16×16 pixels, transparent background.
  SUBJECT = Small glass potion bottle, Alarm scarlet liquid (#E63946),
  cork stopper top, slight highlight upper-left of glass for roundness.
  Tag/label area is a tiny Parchment cream rectangle (no text). Reads
  clearly at 16×16 in a busy inventory grid.]`,
      },
      {
        id: 'REF-09', title: 'World map cinematic background',
        resolution: '320×180', native: [320,180], scale: 3,
        zone: 'All 11 zones — visible during overworld cutscenes',
        Component: window.REF09, roles: window.REF09_ROLES, status: 'pending',
        notes: [
          '11 zones placed per bible: Hearthstone (S, green meadow + cottages) → Borrow Bridge (gorge w/ stone span) → Guildhall (oxblood roofs) → Mage Tower (purple spire NE) → Tavern (lit) → Forge (smoke plume W) → Briney Cove (cobalt sea) → Vault (mountain w/ gold gleam E) → Library (dark spires far E) → Throne (silver citadel atop peak, center N) → Temple (stained-glass cathedral floating in clouds, top, off-map per spec).',
          'Sky gradient Cobalt deep → Cobalt → Mist teal at horizon, with Specular white stars + a Parchment-cream moon.',
          'Pin markers (small flame icons) at each zone in zone-themed colors. Zero text labels per bible rule.',
          'Temple stained-glass uses the literal split-comp triad (Oxblood + Main teal + Forest) + Old gold + Mage glow — the bible\'s narrative payoff baked into the cinematic.',
        ],
        prompt: `[STYLE SUFFIX with:
  RESOLUTION = 320×180 pixels.
  SUBJECT = Painted-pixel-art world map showing all 11 zones in a single
  continent layout. South→north: Hearthstone Village, Borrow Bridge over
  a gorge, Guildhall City (Oxblood roofs), Trait Mage's Tower (Royal
  arcane spire), Tavern (lit), Iron Vale Forge (smoke), Briney Cove
  (Cobalt sea), The Vault (mountain w/ Old gold gleam), Forbidden
  Library (dark cathedral), Throne of the Compiler (silver citadel atop
  peak), Temple (stained-glass cathedral floating in clouds, top, off-map).
  No text labels; flame pin markers in zone-themed colors only.]`,
      },
    ];

    function App() {
      return (
        <DesignCanvas>
          {/* Title block */}
          <div style={{ padding: '8px 60px 32px', maxWidth: 1400 }}>
            <div style={{
              fontFamily: 'Georgia, "Times New Roman", serif',
              fontSize: 44, fontWeight: 800, color: '#1B0810', letterSpacing: -0.8,
              lineHeight: 1.05,
            }}>
              <span style={{ color: '#6B1F35' }}>Pledge & Crown</span>
              <span style={{ color: '#7A7064', fontWeight: 500, fontSize: 32 }}> · Reference Set v2.1</span>
            </div>
            <div style={{
              fontSize: 15, color: '#3E3833', marginTop: 8, lineHeight: 1.5,
              fontFamily: 'Georgia, serif', maxWidth: 720,
            }}>
              All 10 lock-the-look reference images as described in <code style={{ background: '#fff7df', padding: '1px 5px', fontSize: 13 }}>03-art-style-bible.md § "Reference image set"</code>.
              REF-09 has been redone (v2) as a single cohesive painted scene — depth bands, atmospheric perspective, connecting roads, real coastline.
              REF-10 (title wordmark + hero shot) is unlocked now that TESS has cleared.
              Every artboard ships with its native+scaled view, the on-palette colors used, Matt's signoff checklist, and the per-REF prompt for traceability.
            </div>
            <div style={{ display: 'flex', gap: 20, marginTop: 18, fontSize: 11, color: '#7A7064', fontFamily: 'ui-monospace, monospace' }}>
              <div>✦ Pan: drag bg / two-finger</div>
              <div>✦ Zoom: pinch / ⌘+wheel</div>
              <div>✦ Focus an artboard: click its label or the ↗ icon</div>
              <div>✦ Reorder: drag the grip dots</div>
            </div>
          </div>

          {/* Palette legend section */}
          <DCSection
            id="palette"
            title="Heraldic Code · 32-color palette"
            subtitle='split-complementary @ 350° anchor + 140°/178° pair · +42° gold accent · +270° magic flicker'
          >
            <DCArtboard id="legend" label="Palette · all 32 roles" width={1400} height={360}>
              <div style={{ width: '100%', height: '100%', background: '#0d0608', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <PaletteLegend />
              </div>
            </DCArtboard>
          </DCSection>

          {/* The 9 references */}
          <DCSection
            id="characters"
            title="Characters · REF-01 / REF-02 / REF-03 / REF-07"
            subtitle='Player, Ferris guide, Borrow Checker NPC, generic goblin'
          >
            {[REF_META[0], REF_META[1], REF_META[2], REF_META[6]].map(meta => {
              const w = Math.max(540, meta.native[0] * meta.scale + 200);
              const h = Math.max(meta.native[1] * meta.scale + 380, 720);
              const Comp = meta.Component;
              return (
                <DCArtboard key={meta.id} id={meta.id} label={`${meta.id} · ${meta.title}`} width={w} height={h}>
                  <RefArtboard
                    ref_id={meta.id} title={meta.title} resolution={meta.resolution}
                    zone={meta.zone} rolesUsed={meta.roles} promptText={meta.prompt}
                    nativeSize={meta.native} displayScale={meta.scale}
                    notes={meta.notes} status={meta.status}
                  >
                    <Comp scale={meta.scale} />
                  </RefArtboard>
                </DCArtboard>
              );
            })}
          </DCSection>

          <DCSection
            id="tilesets"
            title="Tilesets · REF-04 / REF-05"
            subtitle='Hearthstone Village (cozy) · Trait Mage Tower (mystical)'
          >
            {[REF_META[3], REF_META[4]].map(meta => {
              const w = meta.native[0] * meta.scale + 220;
              const h = meta.native[1] * meta.scale + 380;
              const Comp = meta.Component;
              return (
                <DCArtboard key={meta.id} id={meta.id} label={`${meta.id} · ${meta.title}`} width={w} height={h}>
                  <RefArtboard
                    ref_id={meta.id} title={meta.title} resolution={meta.resolution}
                    zone={meta.zone} rolesUsed={meta.roles} promptText={meta.prompt}
                    nativeSize={meta.native} displayScale={meta.scale}
                    notes={meta.notes} status={meta.status}
                  >
                    <Comp scale={meta.scale} />
                  </RefArtboard>
                </DCArtboard>
              );
            })}
          </DCSection>

          <DCSection
            id="ui-and-environment"
            title="UI + Environment · REF-06 / REF-08 / REF-09"
            subtitle='Code editor frame · healing potion icon · world map cinematic'
          >
            {[REF_META[5], REF_META[7], REF_META[8]].map(meta => {
              const w = meta.native[0] * meta.scale + 220;
              const h = meta.native[1] * meta.scale + 420;
              const Comp = meta.Component;
              return (
                <DCArtboard key={meta.id} id={meta.id} label={`${meta.id} · ${meta.title}`} width={w} height={h}>
                  <RefArtboard
                    ref_id={meta.id} title={meta.title} resolution={meta.resolution}
                    zone={meta.zone} rolesUsed={meta.roles} promptText={meta.prompt}
                    nativeSize={meta.native} displayScale={meta.scale}
                    notes={meta.notes} status={meta.status}
                  >
                    <Comp scale={meta.scale} />
                  </RefArtboard>
                </DCArtboard>
              );
            })}
          </DCSection>

          {/* REF-10 — Title screen */}
          <DCSection
            id="title"
            title="Title screen · REF-10"
            subtitle="Wordmark + hero shot · TESS cleared 2026-04-30 · go for production"
          >
            <DCArtboard id="REF-10" label="REF-10 · Title screen / wordmark" width={1480} height={820}>
              <RefArtboard
                ref_id="REF-10" title="Title screen / wordmark"
                resolution="640×360"
                zone="Game launch · also splash for trailers / store page hero"
                rolesUsed={window.REF10_ROLES}
                promptText={`[STYLE SUFFIX with:
  RESOLUTION = 640×360 pixels.
  SUBJECT = Title screen for the game. Top half: heraldic burgundy
  banner trimmed in Old gold (#D2A53F) with a five-point gold crown
  ornament centered above. Pixel-typeset wordmark "PLEDGE & CROWN" in
  Mist teal (#C9E4DD) with Coalblack (#161313) drop shadow and 1px Old
  gold top-left highlight; the ampersand is solid Old gold. Below the
  banner, a Mist-teal tagline: AN RPG WHERE THE COMPILER IS A BOSS.
  Bottom half: cinematic hero shot — the player + Ferris in idle pose
  on the near end of Borrow Bridge, the Borrow Checker silhouetted at
  the far end where the bridge converges into a sunset. Sky is a vertical
  gradient Oxblood (#6B1F35) → Wineflesh (#982D52) → Cobalt deep (#0E2E54)
  with Specular-white star pricks top-left only and a sun glow on the
  horizon. Distant mountains in Cobalt deep silhouettes. Two small
  Old-gold torch braziers flank the bridge mid-distance. PRESS START
  prompt in Old gold at the bottom edge.]`}
                nativeSize={[640, 360]} displayScale={2}
                notes={[
                  'Banner uses Oxblood field with Old gold double trim — same heraldic vocabulary as in-game shields and the Compiler boss banner; the title screen IS a coat of arms.',
                  'Wordmark in Mist teal (not Parchment) keeps it on-palette with the cool family already in the sky, and lets the gold ampersand pop as the focal accent.',
                  'Hero shot collapses the entire Act 1→2 narrative beat: player + Ferris approach Borrow Bridge, with the Borrow Checker waiting at the far end. New players see the conflict before they read a single word.',
                  'Sunset gradient is the ONLY frame in the canon that uses the full Oxblood→Wineflesh→Cobalt diagonal — reserved for this title shot and the Act 5 finale per bible §"Sky scripts".',
                  'PRESS START in Old gold (not Mist teal) — call-to-action color = the same color as the player\'s staff crystal. Subliminal: the crown chooses you.',
                  'TESS cleared 2026-04-30. Working title locked.',
                ]}
                status="pending"
              >
                <REF10 scale={2} />
              </RefArtboard>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
